# Render Blueprint — 一键部署
# 在 Render 后台：New > Blueprint > 连接本仓库即可，无需手动填命令。
# 平台会自动注入 PORT，prod.mjs 已读取 process.env.PORT。
services:
  - type: web
    name: neon-strike
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    # NOTE: do NOT hardcode PORT here. Render injects the real port via the
    # PORT env var; prod.mjs reads process.env.PORT (falling back to 8080 only
    # when running locally). Hardcoding it would make the server listen on the
    # wrong port and Render could not route traffic to it.

